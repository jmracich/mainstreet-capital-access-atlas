name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  makefile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: make install
      - name: Lint
        run: make lint
      - name: Build generated site
        run: make all
        env:
          SITE_URL: https://example.org/main-street-capital-access-atlas/
      - name: Test
        run: make test
